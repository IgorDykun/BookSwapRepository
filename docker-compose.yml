services:
  aggregator-api:
    build:
      context: .
      dockerfile: BookSwap.Aggregator/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - MongoDb__ConnectionString=mongodb://mongo-db:27017
      - MongoDb__DatabaseName=BookSwapDb
      - Redis__Configuration=redis-monitoring:6379
    depends_on:
      redis-monitoring:
        condition: service_healthy
      mongo-db:
        condition: service_healthy

  redis-monitoring:
    image: redis:alpine
    container_name: redis-monitoring
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: