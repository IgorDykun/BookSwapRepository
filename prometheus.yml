# my global config
global:
  scrape_interval: 15s        # Інтервал збору метрик
  evaluation_interval: 15s    # Інтервал оцінки правил

# Alertmanager configuration (необов’язково)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Правила (необов’язково)
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape конфігурації
scrape_configs:

  # Prometheus self metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"

  # BookSwap Aggregator метрики
  - job_name: "bookswap-aggregator"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:5117"]   # HTTP порт агрегатора
        labels:
          app: "bookswap-aggregator"
