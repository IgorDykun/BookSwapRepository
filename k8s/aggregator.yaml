apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
      - name: aggregator
        image: aggregator-api:v1
        imagePullPolicy: Never 
        ports:
        - containerPort: 8080
        env:
        - name: MongoDb__ConnectionString
          value: "mongodb://mongo-db:27017"
        - name: Redis__Configuration
          value: "redis-monitoring:6379"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aggregator-service
spec:
  type: NodePort 
  selector:
    app: aggregator
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30001